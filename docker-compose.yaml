services:

  frontend:
    build:
      context: ./forntend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://app:${PORT:-8000}/api/v1
    ports:
      - '${FRONTEND_PORT:-3001}:3000'
    volumes:
      - ./forntend:/app
      - /app/node_modules
    networks:
      - app-net
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - dev

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '${API_HOST_PORT:-8000}:${PORT:-8000}'
    env_file:
      - .env.development
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:$${PORT:-8000}/health || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    profiles:
      - dev

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    expose:
      - '6379'
    volumes:
      - redis-data:/data
    networks:
      - app-net
    healthcheck:
      test: redis-cli ping | grep PONG || exit 1
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    profiles:
      - dev

networks:
  app-net:
    driver: bridge

volumes:
  redis-data:
